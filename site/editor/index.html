          });
        },
        // ---- document outline ----
        // Regex-scan for ATX headings (`#`…`######`), same shape as
        // setHeading/updateHeadingLevel above. Skips fenced code blocks so a
        // `#` inside a shell script or comment isn't mistaken for a heading.
        buildOutline() {
          try {
            const lines = this.input.split('\n');
            const items = [];
            let fence = null;
            for (let i = 0; i < lines.length; i++) {
              const line = lines[i];
              const fenceMatch = /^ {0,3}(`{3,}|~{3,})/.exec(line);
              if (fenceMatch) {
                const chars = fenceMatch[1][0], len = fenceMatch[1].length;
                if (!fence) fence = { chars, len };
                else if (chars === fence.chars && len >= fence.len) fence = null;
                continue;
              }
              if (fence) continue;
              const m = /^ {0,3}(#{1,6})\s+(.*?)\s*#*\s*$/.exec(line);
              if (m) items.push({ level: m[1].length, text: m[2] || `H${m[1].length}`, line: i });
            }
            this.outline = items;
          } catch (e) {
            this.outline = []; // the outline is an extra — never let it break the preview
          }
        },
        gotoOutlineItem(item) {
          if (this.view === 'preview') this.view = 'split';
          const lines = this.input.split('\n');
          let pos = 0;
          for (let k = 0; k < item.line && k < lines.length; k++) pos += lines[k].length + 1;
          this.$nextTick(() => {
            const ta = this.$refs.mdTextarea;
            ta.focus();
            ta.setSelectionRange(pos, pos);
            ta.scrollTop = Math.max(0, 8 + item.line * 24 - 24);
            this.updateHeadingLevel();
          });
        },
        showMinimapPopover(item, ev) {
          const r = ev.currentTarget.getBoundingClientRect();
          const W = 384, H = 288, GAP = 10;
          const left = Math.min(Math.max(8, r.left + r.width / 2 - W / 2), Math.max(8, window.innerWidth - W - 8));
          const top = r.top - H - GAP >= 8 ? r.top - H - GAP : r.bottom + GAP;
          this.minimapPopover = { svg: item.svg, label: item.label, style: `left:${left}px;top:${top}px;width:${W}px;height:${H}px` };
        },
        hideMinimapPopover() { this.minimapPopover = null; },

        _saveUiPrefs() {
          localStorage.setItem(UI_KEY, JSON.stringify({ toolbarOpen: this.toolbarOpen, minimapOpen: this.minimapOpen, outlineOpen: this.outlineOpen }));
        },

        // ---- toolbar formatting helpers ----
        wrapSelection(prefix, suffix, placeholder) {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const selected = this.input.slice(start, end) || placeholder;
          this.commitHistory();
          this.input = this.input.slice(0, start) + prefix + selected + suffix + this.input.slice(end);
          const newStart = start + prefix.length;
          this.commitHistory(newStart, newStart + selected.length);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newStart, newStart + selected.length); });
          this.run();
        },
        setHeading(level) {
          const ta = this.$refs.mdTextarea;
          const pos = ta.selectionStart;
          const lineStart = this.input.lastIndexOf('\n', pos - 1) + 1;
          let lineEnd = this.input.indexOf('\n', pos);
          if (lineEnd === -1) lineEnd = this.input.length;
          const line = this.input.slice(lineStart, lineEnd);
          const stripped = line.replace(/^#{1,6}\s+/, '');
          const marker = level ? '#'.repeat(level) + ' ' : '';
          const newLine = marker + stripped;
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + newLine + this.input.slice(lineEnd);
          const newPos = lineStart + newLine.length;
          this.commitHistory(newPos, newPos);
          this.$nextTick(() => {
            ta.focus();
            ta.setSelectionRange(newPos, newPos);
            this.updateHeadingLevel();
          });
          this.run();
        },
        updateHeadingLevel() {
          const ta = this.$refs.mdTextarea;
          const pos = ta.selectionStart;
          const lineStart = this.input.lastIndexOf('\n', pos - 1) + 1;
          let lineEnd = this.input.indexOf('\n', pos);
          if (lineEnd === -1) lineEnd = this.input.length;
          const match = this.input.slice(lineStart, lineEnd).match(/^(#{1,6})\s+/);
          this.currentHeadingLevel = match ? String(match[1].length) : '';
          // Cursor position for the status bar — same caret the heading
          // detection above already resolved, so track it here.
          this.cursorLine = (this.input.slice(0, pos).match(/\n/g) || []).length + 1;
          this.cursorCol = pos - lineStart + 1;
        },
        prefixLines(marker) {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
          let lineEnd = this.input.indexOf('\n', end);
          if (lineEnd === -1) lineEnd = this.input.length;
          const block = this.input.slice(lineStart, lineEnd)
            .split('\n').map((l) => marker + l).join('\n');
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + block + this.input.slice(lineEnd);
          this.commitHistory(lineStart, lineStart + block.length);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(lineStart, lineStart + block.length); });
          this.run();
        },
        insertNumberedList() {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
          let lineEnd = this.input.indexOf('\n', end);
          if (lineEnd === -1) lineEnd = this.input.length;
          const block = this.input.slice(lineStart, lineEnd)
            .split('\n').map((l, i) => `${i + 1}. ${l}`).join('\n');
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + block + this.input.slice(lineEnd);
          this.commitHistory(lineStart, lineStart + block.length);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(lineStart, lineStart + block.length); });
          this.run();
        },
        onKeydown(e) {
          if (e.key === 'Escape' && this.find.open) {
            e.preventDefault();
            this.closeFind();
            return;
          }
          if (e.key === 'Enter' && this.onEnterKey(e)) return;
          if (e.key === 'Tab') {
            e.preventDefault();
            e.shiftKey ? this.outdentSelection() : this.indentSelection();
            return;
          }
          const mod = e.ctrlKey || e.metaKey;
          if (!mod) return;
          const key = e.key.toLowerCase();
          // Undo: Ctrl/Cmd+Z. Redo: Ctrl+Y (Windows/Linux) or Ctrl/Cmd+Shift+Z
          // (the Mac convention, also accepted everywhere else).
          if (key === 'z' && !e.shiftKey) { e.preventDefault(); this.undo(); }
          else if (key === 'y' || (key === 'z' && e.shiftKey)) { e.preventDefault(); this.redo(); }
          else if (key === 'b') { e.preventDefault(); this.wrapSelection('**', '**', 'bold text'); }
          else if (key === 'i') { e.preventDefault(); this.wrapSelection('*', '*', 'italic text'); }
          else if (key === 'k') { e.preventDefault(); this.wrapSelection('[', '](https://)', 'link text'); }
        },
        // ---- smart list continuation ----
        // Enter on a list / task / blockquote line carries the marker onto
        // the new line (with the next number for ordered lists); Enter on an
        // *empty* item removes the marker instead — the way out of a list is
        // just pressing Enter twice. Returns true when it handled the key.
        onEnterKey(e) {
          if (e.isComposing || this.composing) return false;
          if (e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) return false;
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          if (start !== end) return false;
          const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
          let lineEnd = this.input.indexOf('\n', start);
          if (lineEnd === -1) lineEnd = this.input.length;
          const line = this.input.slice(lineStart, lineEnd);
          // "- item" inside a code fence is code, not a list.
          if (this._inFence(lineStart)) return false;

          const list = /^(\s*)([-*+]|\d+[.)])(\s+)(\[[ xX]\]\s+)?(.*)$/.exec(line);
          const quote = !list && /^(\s*)((?:>[ ]?)+)(.*)$/.exec(line);
          const m = list || quote;
          if (!m) return false;
          const markerLen = m[1].length + m[2].length + (list ? m[3].length + (m[4] || '').length : 0);
          // Caret inside the marker itself — plain newline is what's expected.
          if (start < lineStart + markerLen) return false;

          e.preventDefault();
          const content = list ? m[5] : m[3];
          this.commitHistory();
          if (!content.trim() && start >= lineEnd) {
            // Empty item: remove the marker, leaving a blank line (exit).
            this.input = this.input.slice(0, lineStart) + this.input.slice(lineEnd);
            this.commitHistory(lineStart, lineStart);
            this.$nextTick(() => { ta.focus(); ta.setSelectionRange(lineStart, lineStart); this.updateHeadingLevel(); });
            this.run();
            return true;
          }
          let next;
          if (quote) {
            next = '\n' + m[1] + m[2];
          } else if (/\d/.test(m[2])) {
            const num = parseInt(m[2], 10) + 1;
            next = '\n' + m[1] + num + m[2].slice(-1) + m[3];
          } else {
            next = '\n' + m[1] + m[2] + m[3] + (m[4] ? '[ ] ' : '');
          }
          this.input = this.input.slice(0, start) + next + this.input.slice(start);
          let caret = start + next.length;
          if (list && /\d/.test(m[2])) {
            const renumbered = this._renumberOrderedList(caret, m[1]);
            caret = renumbered !== null ? renumbered : caret;
          }
          this.commitHistory(caret, caret);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(caret, caret); this.updateHeadingLevel(); });
          this.run();
          return true;
        },
        // True when pos sits inside an unclosed ``` / ~~~ fence.
        _inFence(pos) {
          let fence = null;
          for (const l of this.input.slice(0, pos).split('\n')) {
            const m = /^ {0,3}(`{3,}|~{3,})(.*)$/.exec(l);
            if (!m) continue;
            if (!fence) fence = { ch: m[1][0], len: m[1].length };
            else if (m[1][0] === fence.ch && m[1].length >= fence.len && !m[2].trim()) fence = null;
          }
          return !!fence;
        },
        // Renumber the ordered items that follow the (just-inserted) item
        // containing fromPos, at the same indent. Deeper-indented lines pass
        // through untouched; a blank line or shallower text ends the list.
        // Returns the adjusted caret position (numbers can change width).
        _renumberOrderedList(fromPos, indent) {
          const lines = this.input.split('\n');
          const caretLine = (this.input.slice(0, fromPos).match(/\n/g) || []).length;
          const itemRe = /^(\s*)(\d+)([.)])(\s+.*)$/;
          const cur = itemRe.exec(lines[caretLine]);
          if (!cur || cur[1] !== indent) return null;
          let num = parseInt(cur[2], 10);
          let changed = false;
          for (let i = caretLine + 1; i < lines.length; i++) {
            const m = itemRe.exec(lines[i]);
            if (m && m[1] === indent) {
              num++;
              if (parseInt(m[2], 10) !== num) {
                lines[i] = m[1] + num + m[3] + m[4];
                changed = true;
              }
            } else if (lines[i].trim() === '' || !lines[i].startsWith(indent + ' ')) {
              break; // list ended
            }
            // deeper-indented continuation/sub-item — skip it
          }
          if (!changed) return null;
          this.input = lines.join('\n');
          return fromPos; // edits are all after the caret — position unchanged
        },
        indentSelection() {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const INDENT = '  ';
          this.commitHistory();
          if (start === end) {
            // On a list item, Tab indents the whole line (nest the item);
            // elsewhere it inserts spaces at the caret.
            let insertAt = start;
            const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
            let lineEnd = this.input.indexOf('\n', start);
            if (lineEnd === -1) lineEnd = this.input.length;
            if (/^\s*(?:[-*+]|\d+[.)])\s/.test(this.input.slice(lineStart, lineEnd)) && !this._inFence(lineStart)) {
              insertAt = lineStart;
            }
            this.input = this.input.slice(0, insertAt) + INDENT + this.input.slice(insertAt);
            const newPos = start + INDENT.length;
            this.commitHistory(newPos, newPos);
            this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newPos, newPos); });
            this.run();
            return;
          }
          const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
          let lineEnd = this.input.indexOf('\n', end);
          if (lineEnd === -1) lineEnd = this.input.length;
          const lines = this.input.slice(lineStart, lineEnd).split('\n');
          const block = lines.map((l) => INDENT + l).join('\n');
          this.input = this.input.slice(0, lineStart) + block + this.input.slice(lineEnd);
          const newStart = start + INDENT.length;
          const newEnd = end + INDENT.length * lines.length;
          this.commitHistory(newStart, newEnd);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newStart, newEnd); });
          this.run();
        },
        outdentSelection() {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const lineStart = this.input.lastIndexOf('\n', start - 1) + 1;
          let lineEnd = this.input.indexOf('\n', end);
          if (lineEnd === -1) lineEnd = this.input.length;
          const INDENT_RE = /^(?: {1,2}|\t)/;
          let firstRemoved = 0, totalRemoved = 0;
          const lines = this.input.slice(lineStart, lineEnd).split('\n').map((l, i) => {
            const m = l.match(INDENT_RE);
            const removed = m ? m[0].length : 0;
            if (i === 0) firstRemoved = removed;
            totalRemoved += removed;
            return removed ? l.slice(removed) : l;
          });
          const block = lines.join('\n');
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + block + this.input.slice(lineEnd);
          const newStart = Math.max(lineStart, start - Math.min(firstRemoved, start - lineStart));
          const newEnd = Math.max(newStart, end - totalRemoved);
          this.commitHistory(newStart, newEnd);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newStart, newEnd); });
          this.run();
        },

        insertCodeBlock(lang) {
          this.wrapSelection('```' + lang + '\n', '\n```', 'code');
        },
        // Plain ``` fence: wraps the selection (fences pushed onto their own
        // lines), or drops an empty fenced block with the cursor inside.
        insertCodeFence() {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          const selected = this.input.slice(start, end);
          const open = (start > 0 && this.input[start - 1] !== '\n' ? '\n' : '') + '```\n';
          const close = '\n```' + (end < this.input.length && this.input[end] !== '\n' ? '\n' : '');
          this.commitHistory();
          this.input = this.input.slice(0, start) + open + selected + close + this.input.slice(end);
          const inner = start + open.length;
          const innerEnd = inner + selected.length;
          this.commitHistory(inner, innerEnd);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(inner, innerEnd); });
          this.run();
        },
        insertDiagram(type) {
          if (!type) return;
          if (type === 'dbml') { this.wrapSelection('```dbml\n', '\n```', DBML_TEMPLATE); return; }
          this.wrapSelection('```mermaid\n', '\n```', MERMAID_TEMPLATES[type] || MERMAID_TEMPLATES.flowchart);
        },
        insertMath() {
          this.wrapSelection('$$\n', '\n$$', 'E = mc^2');
        },
        insertTable() {
          const ta = this.$refs.mdTextarea;
          const pos = ta.selectionStart;
          const lineStart = this.input.lastIndexOf('\n', pos - 1) + 1;
          const needsBlankBefore = lineStart > 0 && this.input[lineStart - 1] !== '\n';
          const table = (needsBlankBefore ? '\n\n' : '') +
            '| Header | Header |\n| --- | --- |\n| Cell | Cell |\n| Cell | Cell |\n';
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + table + this.input.slice(lineStart);
          const newPos = lineStart + table.length;
          this.commitHistory(newPos, newPos);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newPos, newPos); });
          this.run();
        },
        insertHr() {
          const ta = this.$refs.mdTextarea;
          const pos = ta.selectionStart;
          const lineStart = this.input.lastIndexOf('\n', pos - 1) + 1;
          const needsBlankBefore = lineStart > 0 && this.input[lineStart - 1] !== '\n';
          const hr = (needsBlankBefore ? '\n\n' : '') + '---\n';
          this.commitHistory();
          this.input = this.input.slice(0, lineStart) + hr + this.input.slice(lineStart);
          const newPos = lineStart + hr.length;
          this.commitHistory(newPos, newPos);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newPos, newPos); });
          this.run();
        },

        clearDraft() {
          if (!confirm(`Clear "${this.docName}"? This empties the document (undo still works until you leave the page); other documents are untouched.`)) return;
          this.commitHistory();
          this.input = '';
          this.commitHistory(0, 0);
          this._flushSave();
          this.restored = false;
          this.run();
        },

        async copyMarkdown() {
          await navigator.clipboard.writeText(this.input);
          this.flash('Copied');
        },
        exportAction(kind) {
          ({
            'copy-html': () => this.copyHtml(),
            'copy-rich': () => this.copyRichClick(),
            'download-md': () => this.downloadMd(),
            'download-html': () => this.downloadHtml(),
            'print-pdf': () => this.printPdf(),
          })[kind]?.();
        },
        downloadMd() {
          window.downloadFile(this.input, 'document.md', 'text/markdown;charset=utf-8');
          this.flash('Downloaded');
        },
        downloadHtml() {
          window.downloadFile(this.fragment, 'document.html', 'text/html;charset=utf-8');
          this.flash('Downloaded');
        },
        async copyHtml() {
          await navigator.clipboard.writeText(this.fragment);
          this.flash('HTML copied');
        },
        async printPdf() {
          this.error = '';
          try {
            const html = sanitizeHtml(await convertMarkdown(this.input, this.opts));
            const doc = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Document</title><style>'
              + '@page { size: A4; margin: 2cm; }'
              + "body { font: 11pt/1.55 Georgia, 'Times New Roman', serif; color:#1a1a1a; }"
              + 'h1,h2,h3 { font-family: Helvetica, Arial, sans-serif; line-height:1.25; break-after: avoid; }'
              + 'pre { background:#f6f6f6; padding:.75em; font:9pt/1.4 ui-monospace,monospace; white-space:pre-wrap; word-wrap:break-word; break-inside: avoid; }'
              + 'code { font-family: ui-monospace, monospace; font-size:.9em; }'
              + 'table { border-collapse: collapse; width:100%; break-inside: avoid; }'
              + 'th,td { border:1px solid #999; padding:.35em .6em; text-align:left; }'
              + 'blockquote { border-left:3px solid #ccc; margin-left:0; padding-left:1em; color:#555; }'
              + 'img { max-width:100%; }'
              + '.mermaid-diagram { overflow-x:auto; }'
              + '.mermaid-diagram svg { max-width:100%; height:auto; }'
              + '.mermaid-error { background:#fef2f2; color:#b91c1c; padding:.75em; border-radius:.375em; }'
              + (this.opts.math ? getKatexCssText() : '')
              + '</style></head><body>' + html + '</body></html>';
            const f = document.createElement('iframe');
            f.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
            document.body.appendChild(f);
            f.srcdoc = doc;
            f.onload = () => {
              f.contentWindow.focus();
              f.contentWindow.print();
              setTimeout(() => f.remove(), 60000);
            };
            this.flash('Opening print dialog…');
          } catch (e) {
            this.error = e.message || 'Could not prepare the PDF — try again.';
          }
        },

        // ---- shared insert-at-cursor, used by both import flows ----
        insertAtCursor(text) {
          const ta = this.$refs.mdTextarea;
          const start = ta.selectionStart, end = ta.selectionEnd;
          this.commitHistory();
          this.input = this.input.slice(0, start) + text + this.input.slice(end);
          const newPos = start + text.length;
          this.commitHistory(newPos, newPos);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(newPos, newPos); });
          this.run();
        },

        // ---- import: Markdown file / HTML / CSV / JSON ----
        openImport(kind) {
          if (kind === 'md') {
            this.$refs.mdFileInput.value = '';
            this.$refs.mdFileInput.click();
            return;
          }
          this.importKind = kind;
          if (kind === 'html') {
            this.importHtml.text = '';
            this.importHtml.error = '';
            ensureTurndownLoaded().catch(() => {}); // warm the lazy load while the user pastes
          } else {
            this.importCsv.text = '';
            this.importCsv.error = '';
            ensurePapaParseLoaded().catch(() => {});
          }
        },
        closeImport() {
          this.importKind = null;
        },
        async onImportFile(kind, event) {
          const file = event.target.files[0];
          if (!file) return;
          const text = await file.text();
          if (kind === 'html') this.importHtml.text = text;
          else this.importCsv.text = text;
        },
        // Unlike the HTML/CSV imports (which convert a foreign format into a
        // snippet inserted at the cursor), a .md file is already the target
        // format — loading it replaces the whole document, so it's opened
        // directly from the picker rather than going through the import modal.
        async onOpenMarkdownFile(event) {
          const file = event.target.files[0];
          if (!file) return;
          if (this.input.trim() && !confirm(`Replace "${this.docName}" with "${file.name}"? This overwrites the current document; other documents are untouched.`)) {
            event.target.value = '';
            return;
          }
          this.commitHistory();
          this.input = await file.text();
          this.commitHistory(0, 0);
          this.restored = false;
          // An untouched "Untitled" doc takes the file's name.
          const doc = this.docs.find((d) => d.id === this.docsActive);
          if (doc && /^Untitled( \d+)?$/.test(doc.name)) {
            doc.name = file.name.replace(/\.(md|markdown|mdown|mkd|txt)$/i, '');
            this._saveDocsIndex();
          }
          this.run();
          const ta = this.$refs.mdTextarea;
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(0, 0); this.updateHeadingLevel(); });
          this.flash('Loaded ' + file.name);
          event.target.value = '';
        },
        async confirmImportHtml() {
          this.importHtml.error = '';
          try {
            await ensureTurndownLoaded();
            const td = new TurndownService({
              headingStyle: this.importHtml.headingStyle,
              codeBlockStyle: this.importHtml.codeBlockStyle,
              bulletListMarker: this.importHtml.bulletListMarker,
            });
            turndownPluginGfm.gfm(td);
            const result = td.turndown(this.importHtml.text);
            this.insertAtCursor(result);
            this.closeImport();
          } catch (e) {
            this.importHtml.error = e.message || 'Conversion failed';
          }
        },
        async confirmImportCsv() {
          this.importCsv.error = '';
          try {
            if (!this.importCsv.text.trim()) throw new Error('Paste or upload some CSV or JSON first.');
            let header, rows;
            if (this.importCsv.mode === 'csv') {
              await ensurePapaParseLoaded();
              const parsed = Papa.parse(this.importCsv.text.trim(), { skipEmptyLines: true });
              if (parsed.errors.length) throw new Error(parsed.errors[0].message);
              const data = parsed.data;
              if (this.importCsv.header) {
                header = data[0] || [];
                rows = data.slice(1);
              } else {
                const cols = (data[0] || []).length;
                header = Array.from({ length: cols }, (_, i) => `Column ${i + 1}`);
                rows = data;
              }
            } else {
              const arr = JSON.parse(this.importCsv.text);
              if (!Array.isArray(arr)) throw new Error('JSON input must be an array of objects');
              header = [...new Set(arr.flatMap((o) => Object.keys(o)))];
              rows = arr.map((o) => header.map((c) => o[c] ?? ''));
            }
            const result = rowsToMdTable(header, rows, this.importCsv.align);
            this.insertAtCursor(result);
            this.closeImport();
          } catch (e) {
            this.importCsv.error = e.message || 'Conversion failed';
          }
        },
