<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!--#include partials/theme-init.html-->

  <title>Markdown Editor — Write, Preview &amp; Export, Free &amp; Browser-Only</title>
  <meta name="description" content="Write, preview, import from HTML or CSV/JSON, and export to HTML, Word, or PDF — entirely in your browser. Free, open source, no signup, and nothing you type ever leaves your browser.">
  <link rel="canonical" href="__SITE_URL__/editor/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Markdown Editor — Write, Preview &amp; Export, Free &amp; Browser-Only">
  <meta property="og:description" content="Write, preview, import from HTML or CSV/JSON, and export to HTML, Word, or PDF — entirely in your browser. Free, no signup.">
  <meta property="og:url" content="__SITE_URL__/editor/">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="/assets/site.css">
  <script defer src="/assets/theme.js"></script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>[x-cloak]{display:none !important}#page-editor #nav-open-editor{display:none}</style>

  <script defer src="/assets/vendor/alpine-focus-3.15.12.min.js"></script>
  <script defer src="/assets/vendor/marked-18.0.6.min.js"></script>
  <script defer src="/assets/vendor/dompurify-3.4.12.min.js"></script>
  <!-- site.js must load before Alpine core: toolWidget() calls paneResizer()
       at x-data construction time, and Alpine boots synchronously the
       instant its own deferred script runs — so paneResizer must already
       be defined by then. -->
  <script defer src="/assets/site.js"></script>
  <script defer src="/assets/editor-highlight.js"></script>
  <script defer src="/assets/vendor/alpine-3.15.12.min.js"></script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Markdown Online",
    "url": "__SITE_URL__/editor/",
    "description": "A free, all-in-one Markdown workspace that runs entirely in the browser — write and format Markdown with a full toolbar and live preview, import existing HTML or CSV/JSON as Markdown, and export to Word, PDF, or HTML. No upload, no signup, no server-side processing.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any (web browser)",
    "browserRequirements": "Requires JavaScript",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body id="page-editor" class="bg-white dark:bg-neutral-900 text-neutral-800 dark:text-neutral-200 antialiased">

  <!--#include partials/header.html-->

  <main class="mx-auto max-w-screen-2xl px-4">

    <h1 class="sr-only">Markdown Editor</h1>

    <section id="tool" class="mt-4" x-data="toolWidget()" x-init="init()" @keydown.window="onGlobalKeydown($event)">
      <div class="rounded-lg border border-neutral-200 dark:border-neutral-800">
        <div class="flex flex-wrap items-center justify-between gap-2 border-b border-neutral-200 dark:border-neutral-800 p-3">
          <div class="flex flex-wrap items-center gap-2">
            <!-- Document switcher: every document lives in localStorage —
                 switching, creating, and deleting never touches the network. -->
            <div class="relative inline-block" @click.away="docsOpen = false" @keydown.escape.stop="docsOpen = false">
              <button type="button" @click="docsOpen = !docsOpen; docRenaming = false"
                :aria-expanded="docsOpen" aria-haspopup="menu"
                title="Documents — switch, rename, create, or delete (all stored locally in your browser)"
                class="flex min-h-[30px] items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0" aria-hidden="true"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /></svg>
                <span class="max-w-[10rem] truncate font-medium text-neutral-800 dark:text-neutral-200" x-text="docName"></span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0 text-neutral-400 dark:text-neutral-500" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              </button>
              <div x-show="docsOpen" x-cloak
                x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                class="absolute left-0 top-full z-30 mt-1 w-64 rounded-md border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 py-1 text-xs shadow-lg"
                role="menu">
                <template x-for="doc in docs" :key="doc.id">
                  <div class="group flex items-center gap-0.5 px-1">
                    <button type="button" @click="switchDoc(doc.id)" role="menuitem"
                      class="flex min-w-0 flex-1 items-center gap-1.5 rounded px-2 py-1.5 text-left text-neutral-700 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                      <svg x-show="doc.id === docsActive" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0 text-neutral-500 dark:text-neutral-400" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
                      <span x-show="doc.id !== docsActive" class="h-3.5 w-3.5 shrink-0" aria-hidden="true"></span>
                      <span class="truncate" x-text="doc.name"></span>
                    </button>
                    <button type="button" @click.stop="deleteDoc(doc.id)" :aria-label="`Delete ${doc.name}`" :title="`Delete ${doc.name}`"
                      class="rounded p-1 text-neutral-400 opacity-0 hover:bg-neutral-100 hover:text-red-600 group-hover:opacity-100 focus:opacity-100 dark:text-neutral-500 dark:hover:bg-neutral-800 dark:hover:text-red-400">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M10 11v6" /><path d="M14 11v6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M3 6h18" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>
                    </button>
                  </div>
                </template>
                <div class="my-1 border-t border-neutral-200 dark:border-neutral-800" role="separator"></div>
                <div x-show="docRenaming" x-cloak class="flex items-center gap-1 px-2 py-1">
                  <input type="text" x-ref="docRenameInput" x-model="docRenameValue"
                    @keydown.enter.prevent="confirmRename()" @keydown.escape.stop="docRenaming = false"
                    class="w-full rounded border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500"
                    aria-label="New document name">
                  <button type="button" @click="confirmRename()" title="Save name" aria-label="Save name"
                    class="rounded p-1 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
                  </button>
                </div>
                <button type="button" x-show="!docRenaming" @click="startRename()" role="menuitem"
                  class="mx-1 flex w-[calc(100%-0.5rem)] items-center gap-1.5 rounded px-2 py-1.5 text-left text-neutral-700 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0" aria-hidden="true"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" /></svg>
                  Rename current…
                </button>
                <button type="button" @click="newDoc()" role="menuitem"
                  class="mx-1 flex w-[calc(100%-0.5rem)] items-center gap-1.5 rounded px-2 py-1.5 text-left text-neutral-700 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0" aria-hidden="true"><path d="M5 12h14" /><path d="M12 5v14" /></svg>
                  New document
                </button>
              </div>
            </div>

            <div class="flex rounded-md border border-neutral-300 dark:border-neutral-700 text-xs">
              <button type="button" @click="view = 'write'"
                :class="view === 'write' ? 'bg-neutral-900 text-white dark:bg-neutral-100 dark:text-neutral-900' : 'text-neutral-600 hover:bg-neutral-50 dark:text-neutral-400 dark:hover:bg-neutral-800'"
                class="flex items-center gap-1.5 rounded-l-md px-2 py-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M13 21h8" /><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" /></svg>
                Write
              </button>
              <button type="button" @click="view = 'split'"
                :class="view === 'split' ? 'bg-neutral-900 text-white dark:bg-neutral-100 dark:text-neutral-900' : 'text-neutral-600 hover:bg-neutral-50 dark:text-neutral-400 dark:hover:bg-neutral-800'"
                class="flex items-center gap-1.5 border-l border-neutral-300 dark:border-neutral-700 px-2 py-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M12 3v18" /></svg>
                Split
              </button>
              <button type="button" @click="view = 'preview'"
                :class="view === 'preview' ? 'bg-neutral-900 text-white dark:bg-neutral-100 dark:text-neutral-900' : 'text-neutral-600 hover:bg-neutral-50 dark:text-neutral-400 dark:hover:bg-neutral-800'"
                class="flex items-center gap-1.5 rounded-r-md border-l border-neutral-300 dark:border-neutral-700 px-2 py-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" /><circle cx="12" cy="12" r="3" /></svg>
                Preview
              </button>
            </div>

            <button type="button" x-show="view === 'split'" x-cloak @click="stacked = !stacked"
              class="hidden items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 md:inline-flex"
              :title="stacked ? 'Switch to side-by-side layout' : 'Stack panels vertically'">
              <svg x-show="stacked" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M12 3v18" /></svg>
              <svg x-show="!stacked" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M21 9H3" /><path d="M21 15H3" /></svg>
              <span x-text="stacked ? 'Side by side' : 'Stack panels'"></span>
            </button>

            <button type="button" x-show="view === 'split'" x-cloak @click="syncScroll = !syncScroll"
              :aria-pressed="syncScroll"
              class="inline-flex items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800"
              :class="!syncScroll && 'opacity-60'"
              :title="syncScroll ? 'Synced scrolling is on — panes scroll together. Click to disable.' : 'Synced scrolling is off — panes scroll independently. Click to enable.'">
              <svg x-show="syncScroll" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M9 17H7A5 5 0 0 1 7 7h2" /><path d="M15 7h2a5 5 0 1 1 0 10h-2" /><line x1="8" x2="16" y1="12" y2="12" /></svg>
              <svg x-show="!syncScroll" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M9 17H7A5 5 0 0 1 7 7" /><path d="M15 7h2a5 5 0 0 1 4 8" /><line x1="8" x2="12" y1="12" y2="12" /><line x1="2" x2="22" y1="2" y2="22" /></svg>
              <span x-text="syncScroll ? 'Sync on' : 'Sync off'"></span>
            </button>

            <button type="button" x-show="view !== 'preview'" @click="toolbarOpen = !toolbarOpen"
              :aria-expanded="toolbarOpen"
              class="inline-flex items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800"
              :title="toolbarOpen ? 'Hide the formatting toolbar' : 'Show the formatting toolbar'">
              <svg x-show="toolbarOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m7 20 5-5 5 5" /><path d="m7 4 5 5 5-5" /></svg>
              <svg x-show="!toolbarOpen" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m7 15 5 5 5-5" /><path d="m7 9 5-5 5 5" /></svg>
              Toolbar
            </button>

            <input type="file" x-ref="mdFileInput" accept=".md,.markdown,.mdown,.mkd,.txt"
              class="hidden" @change="onOpenMarkdownFile($event)">

            <button type="button" @click="clearDraft()" title="Empty the current document (other documents are untouched)"
              class="flex min-h-[30px] items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M10 11v6" /><path d="M14 11v6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M3 6h18" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>
              Clear
            </button>
          </div>

          <div class="flex flex-wrap items-center gap-1.5">
            <span x-show="toast" x-transition.opacity x-cloak class="mr-1 text-xs text-green-700 dark:text-green-400" x-text="toast"></span>

            <div x-data="pinesSelect({
                    items: [
                      { value: 'md', label: 'Open Markdown file…' },
                      { value: 'html', label: 'Import from HTML…' },
                      { value: 'csv', label: 'Import from CSV/JSON…' },
                    ],
                    value: () => null,
                    onSelect: (v) => openImport(v),
                    placeholder: 'Import',
                  })"
                 @keydown.escape.stop="close()"
                 @keydown.down.prevent="open ? moveActive(1) : openMenu()"
                 @keydown.up.prevent="open ? moveActive(-1) : openMenu()"
                 @keydown.enter.prevent="open ? chooseActive() : openMenu()"
                 class="relative inline-block" title="Import content">
              <button type="button" x-ref="pinesSelectButton" @click="toggle()"
                :aria-expanded="open" aria-haspopup="listbox" aria-label="Import content"
                class="flex min-h-[30px] items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M12 3v12" /><path d="m17 8-5-5-5 5" /><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /></svg>
                <span x-text="displayLabel"></span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0 text-neutral-400 dark:text-neutral-500" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              </button>
              <ul x-show="open" x-cloak x-ref="pinesSelectList" @click.away="close()"
                x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                :class="dropUp ? 'bottom-full mb-1' : 'top-full mt-1'"
                class="absolute right-0 z-20 max-h-60 w-max min-w-full overflow-auto rounded-md border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 py-1 text-xs shadow-lg focus:outline-none"
                role="listbox">
                <template x-for="(item, idx) in items" :key="idx">
                  <li :data-idx="idx" role="presentation">
                    <div x-show="item.header" class="px-3 pt-1.5 pb-1 text-[11px] font-semibold uppercase tracking-wide text-neutral-400 dark:text-neutral-500" x-text="item.header"></div>
                    <div x-show="!item.header" @click="choose(item)" @mousemove="!item.disabled && (activeIndex = idx)"
                      role="option" :aria-selected="selectedItem === item"
                      :class="{ 'bg-neutral-100 text-neutral-900 dark:bg-neutral-700 dark:text-neutral-100': activeIndex === idx, 'opacity-50 pointer-events-none': item.disabled }"
                      class="flex cursor-default items-center justify-between gap-6 px-3 py-1.5">
                      <span x-text="item.label"></span>
                      <svg x-show="selectedItem === item" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 text-neutral-500 dark:text-neutral-400" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
                    </div>
                  </li>
                </template>
              </ul>
            </div>

            <button type="button" @click="copyMarkdown()" title="Copy the raw Markdown source"
              class="flex min-h-[30px] items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>
              Copy Markdown
            </button>

            <div x-data="pinesSelect({
                    items: [
                      { value: 'copy-html', label: 'Copy HTML' },
                      { value: 'copy-rich', label: 'Copy for Word / Docs' },
                      { value: 'download-md', label: 'Download .md' },
                      { value: 'download-html', label: 'Download HTML' },
                      { value: 'print-pdf', label: 'Print / Save as PDF' },
                    ],
                    value: () => null,
                    onSelect: (v) => exportAction(v),
                    placeholder: 'Export',
                  })"
                 @keydown.escape.stop="close()"
                 @keydown.down.prevent="open ? moveActive(1) : openMenu()"
                 @keydown.up.prevent="open ? moveActive(-1) : openMenu()"
                 @keydown.enter.prevent="open ? chooseActive() : openMenu()"
                 class="relative inline-block" title="Export or print this document">
              <button type="button" x-ref="pinesSelectButton" @click="toggle()"
                :aria-expanded="open" aria-haspopup="listbox" aria-label="Export"
                class="flex min-h-[30px] items-center gap-1.5 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M12 15V3" /><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m7 10 5 5 5-5" /></svg>
                <span x-text="displayLabel"></span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 shrink-0 text-neutral-400 dark:text-neutral-500" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              </button>
              <ul x-show="open" x-cloak x-ref="pinesSelectList" @click.away="close()"
                x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                :class="dropUp ? 'bottom-full mb-1' : 'top-full mt-1'"

                    <svg x-show="selectedItem === item" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5 text-neutral-500 dark:text-neutral-400" aria-hidden="true"><path d="M20 6 9 17l-5-5" /></svg>
                  </div>
                </li>
              </template>
            </ul>
          </div>

          <button type="button" @click="insertMath()" title="Insert math (KaTeX) — inserts a math block at the cursor" aria-label="Insert math" class="flex items-center gap-1.5 rounded border border-neutral-300 dark:border-neutral-700 px-2 py-1 text-xs text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M18 7V5a1 1 0 0 0-1-1H6.5a.5.5 0 0 0-.4.8l4.5 6a2 2 0 0 1 0 2.4l-4.5 6a.5.5 0 0 0 .4.8H17a1 1 0 0 0 1-1v-2" /></svg> Math</button>
        </div>

        <div x-ref="paneRow" :style="`--split: ${split}%; --pane-height: ${paneHeight}px`"
          class="flex flex-col md:flex-row"
          :class="{'select-none': dragging || draggingV, 'is-stacked': stacked}">
          <div x-show="view !== 'preview'" class="min-w-0 border-b border-neutral-200 dark:border-neutral-800 p-3 md:border-b-0 md:border-r"
            :class="view === 'split' ? 'split-pane-left' : 'md:w-full'">
            <label for="tw-in" class="sr-only">Markdown input</label>
            <div class="pane-height relative w-full overflow-hidden rounded-md border border-neutral-300 dark:border-neutral-700"
              :class="composing && 'is-composing'">
              <!-- Syntax-highlight backdrop: same text as the textarea, colored.
                   Metric-affecting classes (font, size, leading, padding,
                   whitespace) MUST stay identical to the textarea's or the
                   caret drifts off the colors. See editor-highlight.js. -->
              <div x-ref="mdHighlight" aria-hidden="true"
                class="editor-backdrop pointer-events-none absolute inset-0 select-none overflow-hidden whitespace-pre py-2 pl-12 pr-2 font-mono text-sm leading-6 text-neutral-800 dark:text-neutral-200"></div>
              <!-- z-10 keeps the gutter painting above the (now position:relative)
                   textarea, so horizontally scrolled text still slides under it. -->
              <!-- Seamless gutter: same background as the editor (opaque, so
                   horizontally scrolled text still hides beneath it) with a
                   subtle right divider instead of a tinted panel. -->
              <div x-ref="mdGutter" aria-hidden="true"
                class="pointer-events-none absolute inset-y-0 left-0 z-10 w-10 select-none overflow-hidden border-r border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 py-2 text-right font-mono text-sm leading-6 text-neutral-400 dark:text-neutral-500">
                <template x-for="n in inputLineCount" :key="n">
                  <div class="pr-2 leading-6" x-text="n"></div>
                </template>
              </div>
              <!-- Current find match: painted between the backdrop and the
                   (transparent-text) textarea, positioned from the match's
                   line/column with the pane's fixed monospace metrics. -->
              <div x-show="find.open && findMarkStyle" x-cloak aria-hidden="true" :style="findMarkStyle"
                class="pointer-events-none absolute z-10 rounded-sm bg-amber-400/40 dark:bg-amber-300/30"></div>
              <!-- right-6: clears the textarea's own vertical scrollbar
                   (~15-17px on non-overlay platforms) instead of sitting on it. -->
              <div x-show="find.open" x-cloak
                class="absolute right-6 top-2 z-20 flex flex-col gap-1 rounded-md border border-neutral-300 dark:border-neutral-700 bg-white/95 dark:bg-neutral-900/95 p-1 shadow-md backdrop-blur"
                @keydown.escape.stop.prevent="closeFind()">
                <div class="flex items-center gap-1">
                <button type="button" @click="find.replaceOpen = !find.replaceOpen" :aria-expanded="find.replaceOpen"
                  :title="find.replaceOpen ? 'Hide replace' : 'Show replace (Ctrl+H)'" aria-label="Toggle replace"
                  class="rounded p-1 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                  <svg x-show="!find.replaceOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
                  <svg x-show="find.replaceOpen" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
                </button>
                <input type="text" x-ref="findInput" x-model="find.query" placeholder="Find…"
                  @input="updateFindMatches(true)"
                  @keydown.enter.prevent="$event.shiftKey ? gotoFindMatch(-1) : gotoFindMatch(1)"
                  @keydown="if (($event.ctrlKey || $event.metaKey) && $event.key.toLowerCase() === 'f') { $event.preventDefault(); $event.stopPropagation(); $event.target.select(); }"
                  class="w-40 rounded border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 font-sans text-xs text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500"
                  aria-label="Find in document">
                <span class="min-w-[4rem] px-1 text-center font-sans text-[11px] tabular-nums text-neutral-500 dark:text-neutral-400"
                  x-text="find.query ? (find.count ? `${find.index + 1} of ${find.count}` : 'No results') : ''"></span>
                <button type="button" @click="gotoFindMatch(-1)" :disabled="!find.count" title="Previous match (Shift+Enter)" aria-label="Previous match"
                  class="rounded p-1 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-40 disabled:hover:bg-transparent">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m18 15-6-6-6 6" /></svg>
                </button>
                <button type="button" @click="gotoFindMatch(1)" :disabled="!find.count" title="Next match (Enter)" aria-label="Next match"
                  class="rounded p-1 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-40 disabled:hover:bg-transparent">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
                </button>
                <button type="button" @click="closeFind()" title="Close (Esc)" aria-label="Close find bar"
                  class="rounded p-1 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
                </button>
                </div>
                <div x-show="find.replaceOpen" x-cloak class="flex items-center gap-1 pl-[26px]">
                  <input type="text" x-model="find.replace" placeholder="Replace with…"
                    @keydown.enter.prevent="replaceCurrent()"
                    class="w-40 rounded border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-2 py-1 font-sans text-xs text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500"
                    aria-label="Replace with">
                  <button type="button" @click="replaceCurrent()" :disabled="!find.count" title="Replace the current match (Enter)"
                    class="rounded px-1.5 py-1 font-sans text-[11px] text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-40 disabled:hover:bg-transparent">Replace</button>
                  <button type="button" @click="replaceAll()" :disabled="!find.count" title="Replace all matches"
                    class="rounded px-1.5 py-1 font-sans text-[11px] text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-40 disabled:hover:bg-transparent">All</button>
                </div>
              </div>
              <textarea id="tw-in" x-ref="mdTextarea" x-model="input"
                @input="onTypedInput()" @input.debounce.250ms="run()" @keydown="onKeydown($event)" @scroll="onInputScroll($event)"
                @click="updateHeadingLevel()" @keyup="updateHeadingLevel()" @select="updateHeadingLevel()"
                @compositionstart="composing = true" @compositionend="composing = false"
                spellcheck="true" wrap="off"
                class="relative h-full w-full resize-none overflow-auto whitespace-pre border-0 bg-transparent py-2 pl-12 pr-2 font-mono text-sm leading-6 text-transparent caret-neutral-800 dark:caret-neutral-200 focus:outline-none focus:ring-0"
                placeholder="Start writing Markdown, or paste some in…"></textarea>
            </div>
          </div>

          <div x-show="view === 'split' && !stacked"
            class="hidden shrink-0 cursor-col-resize touch-none items-stretch justify-center border-x border-neutral-200 dark:border-neutral-800 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 md:flex md:w-2"
            :class="dragging && 'bg-neutral-300 dark:bg-neutral-600'"
            @mousedown="startDrag($event)" @touchstart="startDrag($event)"
            title="Drag to resize">
            <div class="my-auto h-8 w-px bg-neutral-400 dark:bg-neutral-600"></div>
          </div>

          <div x-show="view !== 'write'" class="relative min-w-0 p-3" :class="view === 'split' ? 'md:flex-1' : 'md:w-full'">
            <label class="sr-only">Rendered preview</label>
            <div x-ref="preview" @scroll="onPreviewScroll($event)" @mousedown="startPan($event)" @touchstart="startPan($event)"
              :class="panMode ? (panDragging ? 'cursor-grabbing' : 'cursor-grab') : ''"
              class="pane-height w-full overflow-auto rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 p-3 text-sm">
              <div x-ref="previewInner" class="md-preview" :class="panMode && 'select-none'" :style="`zoom: ${previewZoom / 100}`"></div>
            </div>

            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-10 flex items-center gap-0.5 rounded-full border border-neutral-300 dark:border-neutral-700 bg-white/95 dark:bg-neutral-900/95 p-1 text-xs text-neutral-600 dark:text-neutral-400 shadow-md backdrop-blur">
              <button type="button" @click="zoomOut()" :disabled="previewZoom <= zoomMin" title="Zoom out" aria-label="Zoom out"
                class="flex h-6 w-6 items-center justify-center rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 disabled:opacity-40 disabled:hover:bg-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M5 12h14" /></svg>
              </button>
              <button type="button" @click="resetZoom()" title="Reset zoom to 100%"
                class="min-w-[3.25rem] rounded-full px-1.5 py-1 text-center tabular-nums hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100" x-text="`${previewZoom}%`"></button>
              <button type="button" @click="zoomIn()" :disabled="previewZoom >= zoomMax" title="Zoom in" aria-label="Zoom in"
                class="flex h-6 w-6 items-center justify-center rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 disabled:opacity-40 disabled:hover:bg-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M5 12h14" /><path d="M12 5v14" /></svg>
              </button>
              <span class="mx-0.5 h-5 w-px bg-neutral-200 dark:bg-neutral-700" aria-hidden="true"></span>
              <button type="button" @click="zoomToFit()" title="Fit width — scales the preview to fill the pane's full width" aria-label="Fit width"
                class="flex h-6 w-6 items-center justify-center rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3" /><path d="M21 8V5a2 2 0 0 0-2-2h-3" /><path d="M3 16v3a2 2 0 0 0 2 2h3" /><path d="M16 21h3a2 2 0 0 0 2-2v-3" /></svg>
              </button>
              <button type="button" @click="panMode = !panMode" :aria-pressed="panMode" title="Pan tool — drag the preview to move it instead of scrolling" aria-label="Toggle pan tool"
                :class="panMode ? 'bg-neutral-900 text-white dark:bg-neutral-100 dark:text-neutral-900' : 'hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100'"
                class="flex h-6 w-6 items-center justify-center rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3.5 w-3.5" aria-hidden="true"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2" /><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2" /><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8" /><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" /></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="flex h-2 cursor-row-resize touch-none items-center justify-center border-b border-t border-neutral-200 dark:border-neutral-800 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700"
          :class="draggingV && 'bg-neutral-300 dark:bg-neutral-600'"
          @mousedown="startVDrag($event)" @touchstart="startVDrag($event)"
          title="Drag to resize height">
          <div class="h-px w-8 bg-neutral-400 dark:bg-neutral-600"></div>
        </div>

        <!-- Document outline: one entry per ATX heading, indented by level.
             Click jumps the editor to that heading's line. -->
        <div x-show="outline.length" x-cloak>
          <div class="flex items-center px-2 py-1">
            <button type="button" @click="outlineOpen = !outlineOpen" :aria-expanded="outlineOpen"
              class="flex items-center gap-1.5 rounded px-1.5 py-0.5 text-[11px] text-neutral-500 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100"
              :title="outlineOpen ? 'Collapse the document outline' : 'Expand the document outline'">
              <svg x-show="outlineOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3 w-3" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              <svg x-show="!outlineOpen" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3 w-3" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
              <span x-text="`Outline (${outline.length})`"></span>
            </button>
          </div>
          <div x-show="outlineOpen" class="max-h-32 overflow-y-auto border-b border-neutral-100 dark:border-neutral-800 px-1 pb-2">
            <template x-for="(item, idx) in outline" :key="idx">
              <button type="button" @click="gotoOutlineItem(item)"
                :title="`Jump to “${item.text}”`"
                :style="`padding-left:${8 + (item.level - 1) * 14}px`"
                class="block w-full truncate rounded px-2 py-0.5 text-left text-[11px] text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500"
                x-text="item.text"></button>
            </template>
          </div>
        </div>

        <!-- Diagram mini-map: one thumbnail per diagram in the document
             (per table for DBML blocks). Click jumps the editor to the
             corresponding code block; hover shows a zoomed popover. -->
        <div x-show="minimap.length" x-cloak>
          <div class="flex items-center px-2 py-1">
            <button type="button" @click="minimapOpen = !minimapOpen" :aria-expanded="minimapOpen"
              class="flex items-center gap-1.5 rounded px-1.5 py-0.5 text-[11px] text-neutral-500 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100"
              :title="minimapOpen ? 'Collapse the diagram map' : 'Expand the diagram map'">
              <svg x-show="minimapOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3 w-3" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              <svg x-show="!minimapOpen" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-3 w-3" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
              <span x-text="`Diagrams (${minimap.length})`"></span>
            </button>
          </div>
          <div x-show="minimapOpen" class="flex gap-2 overflow-x-auto px-3 pb-2">
            <template x-for="(item, idx) in minimap" :key="idx">
              <button type="button" @click="gotoMinimapItem(item)"
                @mouseenter="showMinimapPopover(item, $event)" @mouseleave="hideMinimapPopover()"
                :title="`Jump to ${item.label} in the editor`"
                class="flex w-28 shrink-0 flex-col overflow-hidden rounded-md border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 hover:border-neutral-400 dark:hover:border-neutral-500 focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500">
                <span class="minimap-thumb block h-16 w-full p-1" aria-hidden="true" x-html="item.svg"></span>
                <span class="block truncate border-t border-neutral-100 dark:border-neutral-800 px-1.5 py-0.5 text-left text-[10px] text-neutral-500 dark:text-neutral-400" x-text="item.label"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- Hover-zoom popover for the mini-map: fixed-positioned (computed
             from the thumbnail's rect) so the strip's own overflow-x scroll
             container can't clip it. -->
        <div x-show="minimapPopover" x-cloak :style="minimapPopover ? minimapPopover.style : ''"
          class="minimap-popover pointer-events-none fixed z-50 flex flex-col overflow-hidden rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 shadow-xl">
          <span class="block border-b border-neutral-100 dark:border-neutral-800 px-2 py-1 text-[11px] font-medium text-neutral-500 dark:text-neutral-400" x-text="minimapPopover ? minimapPopover.label : ''"></span>
          <span class="block min-h-0 flex-1 p-2" x-html="minimapPopover ? minimapPopover.svg : ''"></span>
        </div>

        <!-- Status bar: document statistics, cursor position, and encoding
             live here (VS Code-style) so the main toolbar stays actions-only. -->
        <div class="flex flex-wrap items-center justify-between gap-x-4 gap-y-0.5 border-t border-neutral-200 dark:border-neutral-800 px-3 py-1 text-[11px] text-neutral-400 dark:text-neutral-500">
          <div class="flex flex-wrap items-center gap-x-3">
            <span x-show="restored" x-cloak>Draft restored from your last visit.</span>
            <span x-show="savedAt" x-cloak x-text="'Saved ' + savedAt"></span>
          </div>
          <div class="flex flex-wrap items-center gap-x-3 tabular-nums">
            <span x-text="`Ln ${cursorLine}, Col ${cursorCol}`"></span>
            <span title="Token count is an estimate for LLMs (common heuristic: ≈4 characters per token)"
              x-text="`${wordCount} words · ${charCount} characters · ~${tokenCount} tokens`"></span>
            <span>UTF-8</span>
            <span>Markdown</span>
          </div>
        </div>

      </div>

      <template x-teleport="body">
        <div x-show="importKind !== null" x-cloak
          class="fixed inset-0 z-[99] flex items-center justify-center p-4"
          @keydown.escape.window="closeImport()">
          <div x-show="importKind !== null"
            x-transition:enter="ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="absolute inset-0 bg-black/40" @click="closeImport()"></div>

          <div x-show="importKind !== null"
            x-trap.inert.noscroll="importKind !== null"
            x-transition:enter="ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100"
            x-transition:leave="ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0 scale-100" x-transition:leave-end="opacity-0 translate-y-2 scale-95"
            class="relative flex max-h-[90vh] w-full max-w-lg flex-col overflow-hidden rounded-lg border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 shadow-lg">

            <div class="flex items-center justify-between border-b border-neutral-200 dark:border-neutral-800 p-4">
              <h3 class="text-lg font-semibold" x-text="importKind === 'html' ? 'Import from HTML' : 'Import from CSV/JSON'"></h3>
              <button type="button" @click="closeImport()" aria-label="Close" class="rounded-full p-1 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide h-5 w-5" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
              </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4">
              <template x-if="importKind === 'html'">
                <div class="space-y-3">
                  <label class="block">
                    <span class="text-xs font-medium uppercase text-neutral-500 dark:text-neutral-400">HTML source</span>
                    <textarea x-model="importHtml.text" rows="8" spellcheck="false"
                      class="mt-1 w-full resize-y rounded-md border border-neutral-300 dark:border-neutral-700 p-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-neutral-400 dark:focus:ring-neutral-500"
                      placeholder="Paste HTML here…"></textarea>
                  </label>
                  <label class="block">

        _loadDocs() {

        deleteDoc(id) {

        async run() {

        onPreviewScroll(e) {

        // Ctrl+F should open the in-editor find no matter what's focused —
        // a textarea-only binding loses to the browser's page find whenever
        // focus is on a toolbar button or nowhere at all. Native find stays
        // available in preview-only view (no write pane to search) and while

        updateFindMatches(jump) {

          const r = this.find.replace;
          this.commitHistory();
          this.input = this.input.slice(0, start) + r + this.input.slice(start + this.find.query.length);
          const caret = start + r.length;
          this.commitHistory(caret, caret);
          this.run();
          // $nextTick: x-model writes the new value into the DOM on the next
          // tick, resetting the caret — position it (and recompute matches
          // from it) only after that. jump=true restarts from the caret, so
          // it lands on the next match and skips any new occurrence the
          // replacement itself introduced.

        // Selects the match in the textarea (without stealing focus from the

        // (leading-6 monospace, py-2 pl-12, wrap="off"), so line/column map
        // straight to pixels — no DOM measurement of the text needed.
        revealFindMatch() {
          const ta = this.$refs.mdTextarea;
          const start = this._findMatches[this.find.index];

          const before = this.input.slice(0, start);
          const line = (before.match(/\n/g) || []).length;
          const col = start - (before.lastIndexOf('\n') + 1);

          if (start === undefined) { this.findMarkStyle = ''; return; }
          const before = this.input.slice(0, start);

        },

        // ---- preview zoom/pan ----
        zoomIn() { this.previewZoom = Math.min(this.zoomMax, this.previewZoom + ZOOM_STEP); },
        zoomOut() { this.previewZoom = Math.max(this.zoomMin, this.previewZoom - ZOOM_STEP); },
        resetZoom() { this.previewZoom = 100; },
        // Fit to width: scales the preview so the widest content exactly
        // fills the pane's width — the full horizontal space is always
        // used, and anything taller than the pane scrolls vertically.
        // The measurement must happen with zoom forced to 1:
        // scrollWidth/Height inside the zoomed subtree are reported in its
        // own logical units, but inner is an auto-width block whose
        // *layout* width resolves to viewportWidth / zoom — so measured at,
        // say, 27% zoom, inner.scrollWidth inflates to exactly "whatever
        // fits right now" and the computed fit can never scale back up.
        // Forcing zoom: 1 for the reads is synchronous, so nothing paints
        // in between.
        // inner.scrollWidth alone isn't enough, either: diagrams/tables/code
        // blocks set their own overflow-x so they scroll independently
        // instead of pushing inner's scrollWidth out, so an oversized one's
        // true extent has to be measured on itself, not on inner.
        zoomToFit() {

          if (!viewport || !inner) return;
          const zoomStyle = inner.style.zoom;
          inner.style.zoom = 1;
          let naturalWidth = inner.scrollWidth;
          inner.querySelectorAll('.mermaid-diagram, pre, table').forEach((el) => {

          if (!naturalWidth) return;

          const availWidth = viewport.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);

        // text just gets taller). Horizontal overflow usually isn't — markdown
        // text reflows to fit the width — so the only thing that ever scrolls
        // sideways is a wide table/pre/mermaid block with its own overflow-x,
        // nested inside the viewport. Drag those directly instead of the
        // viewport, or horizontal panning has nothing to move.

        // ---- diagram mini-map ----
        // One entry per diagram in the document — and one per *table* for
        // DBML blocks, so each thumbnail maps to a `Table name { ... }`

        // already rendered into the preview (matching k-th diagram fence to
        // k-th rendered .mermaid-diagram/.mermaid-error element, both being
        // in document order); DBML tables are re-rendered individually via
        // the first-party DbmlRenderer, which is cheap and yields a clean
        // single-table diagram (refs to absent tables are dropped by the
        // renderer, not errors).
        buildMinimap() {

            if (!this.opts.mermaid && !this.opts.dbml) { this.minimap = []; return; }
            const dark = document.documentElement.classList.contains('dark');
            const rendered = this.$refs.previewInner.querySelectorAll('.mermaid-diagram, .mermaid-error');
            const lines = this.input.split('\n');
            const items = [];
            let diagIdx = 0;
            for (let i = 0; i < lines.length; i++) {

              if (!m) continue;

                j++;

                for (const snip of this._dbmlNodeSnippets(body)) {
                  try {
                    const { svg } = window.DbmlRenderer.render(snip.text, { dark });
                    items.push({
                      label: snip.name,
                      svg: DOMPurify.sanitize(svg, { USE_PROFILES: { svg: true, svgFilters: true } }),
                      line: i + 1 + snip.startLine,
                    });
                  } catch (e) { /* unparseable table — no thumbnail for it */ }
                }

                const el = rendered[diagIdx];

                // outerHTML here is already-sanitized markup.

              }
              diagIdx++;
              i = j;
            }

          } catch (e) {

          }

        // thumbnails even when another statement in the block fails to parse.
        _dbmlNodeSnippets(body) {
          const lines = body.split('\n');
          const out = [];
          let i = 0;
          while (i < lines.length) {
            const m = /^\s*(?:Table|Enum)\s+"?([\w.]+)"?.*\{/i.exec(lines[i]);
            if (!m) { i++; continue; }

            for (; j < lines.length; j++) {

          }

        gotoMinimapItem(item) {

            // lines under py-2 (8px) padding.
