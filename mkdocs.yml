site_name: Markdown Online — Internal Wiki
site_dir: .mkdocs-site  # NOT "site/" — that's the public website source, not the wiki output
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
